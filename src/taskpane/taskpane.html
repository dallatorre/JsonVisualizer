<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Json Visualizer</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <main id="app-body" class="taskpane-main" style="display:none;">
        <div id="attachment-picker" class="attachment-picker" style="display:none;">
            <label for="attachment-select">Seleziona JSON:</label>
            <select id="attachment-select"></select>
        </div>
        <div class="viewer-wrap">
            <pre><code id="viewer" class="json hljs" aria-live="polite"></code></pre>
            <output id="error" class="json-error" aria-live="assertive"></output>
        </div>
    </main>

</body>

</html>
